<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=, initial-scale=1.0">
        <title>Fetch user data and display names in a list</title>
</head>
<body>
     <ul id="userList"></ul>

<script>
fetch("https://jsonplaceholder.typicode.com/users")
.then(res => res.json())
.then(users => {
    let list = document.getElementById("userList");
    users.forEach(user => {
        let li = document.createElement("li");
        li.textContent = user.name;
        list.appendChild(li);
    });
});
</script> 
</body>
</html>
